<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#05030c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WORDOD" />
    <title>WORD OVERDOSE</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/icon.svg" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <canvas id="fx-canvas"></canvas>
    <div id="app">
      <!-- HOME -->
      <section id="screen-home" class="screen active">
        <div class="streak-badge" id="home-streak">🔥 0日</div>
        <div>
          <h1 class="neon-title">WORD<br />OVERDOSE</h1>
          <p class="subtitle">ENGLISH x DOPAMINE</p>
        </div>
        <div class="home-stats">
          <span id="home-level">Lv.1 単語の卵</span>
          <span id="home-best">BEST 0</span>
        </div>
        <div class="home-actions">
          <button class="btn big" id="btn-start">▶ START</button>
          <button class="btn secondary" id="btn-settings">SETTINGS</button>
        </div>
      </section>

      <!-- GAME -->
      <section id="screen-game" class="screen">
        <div class="game-top">
          <span class="q-progress" id="game-progress">1 / 20</span>
          <span class="game-score" id="game-score">0</span>
        </div>
        <div class="combo-display">
          <span class="combo-num hidden" id="game-combo">0</span>
          <span class="combo-mult" id="game-mult"></span>
        </div>
        <div class="timer-bar"><div class="timer-fill" id="game-timer"></div></div>
        <div class="word-card">
          <div class="word-en" id="game-word">—</div>
        </div>
        <div class="choices" id="game-choices"></div>
        <div class="countdown hidden" id="game-countdown">3</div>
      </section>

      <!-- RESULT -->
      <section id="screen-result" class="screen">
        <div class="result-rank" id="result-rank">S</div>
        <div class="new-record" id="result-newrecord" style="display: none">★ NEW RECORD ★</div>
        <div class="result-score" id="result-score">0</div>
        <div class="result-line" id="result-detail">MAX COMBO 0 ・ ACCURACY 0%</div>
        <div class="result-line" id="result-level">Lv.1 単語の卵</div>
        <div class="xp-bar"><div class="xp-fill" id="result-xp"></div></div>
        <div class="result-actions">
          <button class="btn big" id="btn-retry">RETRY</button>
          <button class="btn secondary" id="btn-home">HOME</button>
        </div>
      </section>

      <!-- SETTINGS -->
      <section id="screen-settings" class="screen">
        <div class="settings-header">
          <button class="btn secondary" id="btn-back" style="padding: 10px 16px">←</button>
          <h2 class="neon-title" style="font-size: 28px">SETTINGS</h2>
        </div>
        <div class="settings-row">
          <label>BGM VOLUME <span id="lbl-bgm"></span></label>
          <input type="range" id="set-bgm" min="0" max="1" step="0.05" />
        </div>
        <div class="settings-row">
          <label>SFX VOLUME <span id="lbl-sfx"></span></label>
          <input type="range" id="set-sfx" min="0" max="1" step="0.05" />
        </div>
        <div class="settings-row">
          <label>MUTE ALL</label>
          <div class="seg" id="set-mute">
            <button data-v="off">OFF</button><button data-v="on">ON</button>
          </div>
        </div>
        <div class="settings-row">
          <label>EFFECT INTENSITY（点滅減光）</label>
          <div class="seg" id="set-intensity">
            <button data-v="full">FULL</button><button data-v="reduced">REDUCED</button>
          </div>
        </div>
        <div class="settings-row">
          <label>DATA</label>
          <button class="btn secondary danger" id="btn-reset">RESET ALL DATA</button>
        </div>
      </section>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
